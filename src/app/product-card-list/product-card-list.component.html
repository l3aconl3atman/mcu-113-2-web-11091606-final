@for (product of products; track $index) {
<app-product-card
  [id]="product.id"
  [photoUrl]="product.photoUrl"
  [productName]="product.name"
  [author]="product.authors"
  [company]="product.company"
  [price]="product.price"
></app-product-card>
}
